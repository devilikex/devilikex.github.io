<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <script src="./lyket.js?apiKey=xxx&baseUrl=http://localhost:3000"></script>
    <style>
      button {
        background-color: blue;
      }
    </style>
  </head>
  <body style="font-size: 30px;">
    <div
      data-lyket-type="like"
      data-lyket-namespace="test-widget"
      data-lyket-id="like-default-test"
      data-lyket-color-primary="#ffaa66"
      data-lyket-color-secondary="rgba(220, 234, 108, 0.6)"
      data-lyket-color-background="rgba(255, 224, 138, 0.4)"
      data-lyket-color-text="black"
      data-lyket-color-icon="violet"
      data-lyket-color-highlight="#ff00c3"
    ></div>
    <div
      data-lyket-type="clap"
      data-lyket-namespace="test-widget"
      data-lyket-id="clap-default-test"
    ></div>
    <div
      data-lyket-type="updown"
      data-lyket-namespace="test-widget"
      data-lyket-id="ud-default-test"
      data-lyket-color-primary="#ffaa66"
      data-lyket-color-secondary="rgba(220, 234, 108, 0.6)"
      data-lyket-color-background="rgba(255, 224, 138, 0.4)"
      data-lyket-color-text="black"
      data-lyket-color-icon="violet"
      data-lyket-color-highlight="#ff00c3"
    ></div>
    <div
      data-lyket-type="like"
      data-lyket-namespace="test-widget"
      data-lyket-template="twitter"
      data-lyket-id="like-template-test"
    ></div>
    <div
      data-lyket-type="clap"
      data-lyket-namespace="test-widget"
      data-lyket-template="medium"
      data-lyket-id="clap-template-test"
    ></div>
    <div
      data-lyket-type="updown"
      data-lyket-namespace="test-widget"
      data-lyket-template="chevron"
      data-lyket-show-counter-from="2"
      data-lyket-id="ud-template-test"
    ></div>
    <div
      data-lyket-type="rate"
      data-lyket-namespace="test-widget"
      data-lyket-id="rate-template-test"
      data-lyket-show-rating="average"
    ></div>
    <div
      data-lyket-type="rate"
      data-lyket-namespace="test-widget"
      data-lyket-id="rate-template-test"
      data-lyket-show-rating="user"
    ></div>
    <div
      data-lyket-type="rate"
      data-lyket-namespace="test-widget"
      data-lyket-id="rate-template-test"
      data-lyket-show-rating="user"
      data-lyket-template="custom"
    ></div>
    <div
      data-lyket-type="rate"
      data-lyket-namespace="test-widget"
      data-lyket-id="rate-template-test"
      data-lyket-show-rating="user"
      data-lyket-template="heart"
    ></div>
  </body>
</html>
