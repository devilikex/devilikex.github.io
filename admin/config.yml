backend:
backend:
  name: github
  repo: devilikex/devilikex.github.io
  branch: main
  auth_endpoint: https://sveltia.org 
media_folder: "images/uploads"
public_folder: "/images/uploads"
collections:
  - name: "updatesCol"
    label: "Updates"
    files: 
      - file: "_data/updates.json"
        label: "Blog Updates"
        name: "blogUpdates"
        fields:
          - label: "Blog Posts"
            name: "posts"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Publish Date", name: "date", widget: "datetime"}
              - {label: "Body", name: "body", widget: "markdown"}
